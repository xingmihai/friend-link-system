<!DOCTYPE html><html><head><meta charset="UTF-8"></head>
<body bgcolor="#ffffff" text="#333333">
<!-- 尝试1: 纯HTML属性 -->
<p>测试1: bgcolor+#ffffff, text+#333333（纯HTML属性）</p>
<hr>
<!-- 尝试2: 1x1 GIF锚点 -->
<img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==" width="1" height="1">
<p><font color="#333333">测试2: 加1x1 GIF + font tag</font></p>
<hr>
<!-- 尝试3: color-scheme only light -->
<style>body{color-scheme:only light}</style>
<font color="#333333"><b>测试3: color-scheme: only light + font tag</b></font>
<hr>
<!-- 尝试4: forced-color-adjust -->
<font color="#333333" style="forced-color-adjust:none;color-scheme:only light"><b>测试4: forced-color-adjust:none</b></font>
<hr>
<!-- 尝试5: CSS filter undo -->
<p style="filter:invert(0)"><font color="#333333"><b>测试5: filter:invert(0)</b></font></p>
<hr>
<!-- 尝试6: text-decoration跳过反转 -->
<p style="text-decoration:none;text-decoration-color:transparent"><font color="#333333"><b>测试6: text-decoration绕过</b></font></p>
</body></html>
